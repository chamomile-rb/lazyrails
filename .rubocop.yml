AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "bin/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Enabled: true

Style/Documentation:
  Enabled: false

Layout/LineLength:
  Max: 150

# View methods accept width:/height: for interface consistency even when unused
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

# Case/when branches intentionally return the same value for readability
Lint/DuplicateBranch:
  Enabled: false

# StatRow#methods is a column name, not overriding Data#methods
Lint/DataDefineOverride:
  Enabled: false

# Specs define test-only structs inside describe blocks
Lint/ConstantDefinitionInBlock:
  Exclude:
    - "spec/**/*_spec.rb"

# TUI key dispatchers and view renderers are inherently complex.
# High but finite limits catch truly problematic methods while allowing
# the large case/when dispatchers that are standard in TUI apps.
Metrics/ClassLength:
  Max: 500

Metrics/ModuleLength:
  Max: 600

Metrics/BlockLength:
  Max: 40
  Exclude:
    - "spec/**/*_spec.rb"

Metrics/MethodLength:
  Max: 100

Metrics/AbcSize:
  Max: 120

Metrics/CyclomaticComplexity:
  Max: 50

Metrics/PerceivedComplexity:
  Max: 50

Metrics/ParameterLists:
  Max: 16

# Short param names (e.g., `n`, `a`, `i`) are idiomatic in blocks and iterators
Naming/MethodParameterName:
  Enabled: false

# set_flash, set_where etc. are domain methods, not setters
Naming/AccessorMethodName:
  Enabled: false
